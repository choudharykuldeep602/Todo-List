<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🔹 Navbar -->
  <header class="navbar">
    <div class="logo">📝 TodoApp</div>

    <nav class="nav-links">
      <a href="#">All Tasks</a>
      <a href="#">Completed</a>
      <a href="#">Pending</a>
      <a href="#">Categories</a>
      <a href="#">About</a>
    </nav>

    <div class="nav-right">
      <input type="text" placeholder="🔍 search">
      <a href="#" class="contact">Contact Us</a>
    </div>
  </header>

  <!-- 🔹 Todo Section -->
  <div class="container">
    <h1>My Tasks</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Enter new task">
      <button onclick="addTodo()">Add</button>
    </div>

    <ul id="todoList">
      <li>Learn HTML <button onclick="removeTask(this)">❌</button></li>
      <li>Practice CSS <button onclick="removeTask(this)">❌</button></li>
      <li>Learn JavaScript <button onclick="removeTask(this)">❌</button></li>
      <li>Build Project <button onclick="removeTask(this)">❌</button></li>
      <li>Prepare Interview <button onclick="removeTask(this)">❌</button></li>
    </ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
